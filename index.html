<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/ThabatLogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const storageKey = 'thabat_theme';
        const root = document.documentElement;

        try {
          const storedTheme = localStorage.getItem(storageKey);
          const resolvedTheme =
            storedTheme === 'light' || storedTheme === 'dark'
              ? storedTheme
              : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

          root.dataset.theme = resolvedTheme;
          root.style.colorScheme = resolvedTheme;
          root.classList.toggle('dark', resolvedTheme === 'dark');
          root.classList.toggle('light', resolvedTheme === 'light');
        } catch {
          root.dataset.theme = 'dark';
          root.style.colorScheme = 'dark';
          root.classList.add('dark');
        }
      })();
    </script>
    
    <!-- Google Fonts: Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <title>Thabat | ثبات - Quran Review Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
